border:none;

padding:15px;

height:45px;

border-radius:50%;

border:none;

color:white;

}


.emoji{

/* POPUP */

.popup{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#0008;

z-index:5000;

align-items:center;

.popup-box{

width:90%;

max-width:400px;

padding:25px;

.popup-box input{

width:100%;

padding:12px;

border-radius:10px;

.popup-box button{

.close-popup{

/* BOUTONS STATUTS */

width:65px;

height:65px;

.floating-prev{

}



.floating-next{

/* AFFICHAGE STATUT */

.status-viewer{

left:0;

/* MODE SOMBRE */

color:white;

color:white;

}

<script>


let currentUser="";

let database=null;



// ==========================
// BASE LOCALE INDEXEDDB
// ==========================


let request=indexedDB.open("AssistantIA_Local",1);



request.onupgradeneeded=function(e){

database=e.target.result;


if(!database.objectStoreNames.contains("users")){

database.createObjectStore("users",{keyPath:"name"});

}


if(!database.objectStoreNames.contains("messages")){

database.createObjectStore("messages",{
keyPath:"id",
autoIncrement:true
});

}


if(!database.objectStoreNames.contains("session")){

database.createObjectStore("session",{
keyPath:"id"
});

}

};



request.onsuccess=function(e){

database=e.target.result;

loadUserSession();

addAIMessage(
"Bonjour 👋 Je suis l'assistant IA Lesfacilitateurs. Comment puis-je vous aider ?"
);

};




// ==========================
// CREATION COMPTE
// ==========================


function openRegister(){

document.getElementById("registerPopup").style.display="flex";

}



function closeRegister(){

document.getElementById("registerPopup").style.display="none";

}




function createAccount(){


let name=document.getElementById("registerName").value.trim();



if(name===""){

alert("Veuillez entrer votre nom");

return;

}



currentUser=name;



localStorage.setItem(
"assistant_user",
name
);



if(database){

let tx=database.transaction(
"users",
"readwrite"
);


tx.objectStore("users").put({

name:name,

date:new Date().toLocaleString()

});


}



document.getElementById("profile").innerHTML=

"✅ Connecté : "+name;



closeRegister();



addAIMessage(
"Bienvenue "+name+" 👋 Votre compte est créé."
);



}




// ==========================
// SESSION
// ==========================


function saveUserSession(){


if(!database)return;


let tx=database.transaction(
"session",
"readwrite"
);


tx.objectStore("session").put({

id:1,

name:currentUser

});


}




function loadUserSession(){


let saved=localStorage.getItem(
"assistant_user"
);



if(saved){

currentUser=saved;


document.getElementById("profile").innerHTML=

"✅ Connecté : "+currentUser;


return;

}



}




// ==========================
// CHAT
// ==========================


function sendMessage(){


let input=document.getElementById("question");


let text=input.value.trim();



if(text==="")return;



if(currentUser===""){


alert(
"Créez un compte avant d'utiliser l'assistant"
);


openRegister();


return;

}



addUserMessage(text);


saveMessage(
"user",
text
);



input.value="";



setTimeout(function(){


let response=AIResponse(text);


addAIMessage(response);



saveMessage(
"ia",
response
);



},500);



}




function addUserMessage(text){


let box=document.getElementById("chat");



box.innerHTML += `

<div class="message user">

${text}


<div class="message-time">

${new Date().toLocaleTimeString()}

</div>


</div>

`;



box.scrollTop=box.scrollHeight;


}




function addAIMessage(text){

let box=document.getElementById("chat");


// Transformer les liens en liens cliquables

let message=text.replace(
/(https?:\/\/[^\s]+)/g,
'<br><a href="$1" target="_blank" style="color:#0066ff;font-weight:bold;">🔗 Ouvrir le lien</a>'
);



box.innerHTML += `

<div class="message ai">

<b>🤖 Assistant IA</b>

<br>

${message}

<div class="message-time">

${new Date().toLocaleTimeString()}

</div>

</div>

`;



box.scrollTop=box.scrollHeight;


}


// ==========================
// SAUVEGARDE MESSAGES
// ==========================


function saveMessage(type,text){


if(!database)return;



let tx=database.transaction(
"messages",
"readwrite"
);



tx.objectStore("messages").add({

user:currentUser,

type:type,

text:text,

date:new Date().toLocaleString()

});


}





// ==========================
// BASE DE CONNAISSANCES IA
// ==========================


const BASE_CONNAISSANCE=[


{


questions:[

"bonjour",
"salut",
"hello",
"bonsoir"

],


reponse:

"Bonjour 👋 Bienvenue sur l'assistant IA Lesfacilitateurs."

},



{


questions:[

"site",
"site web",
"page officielle"

],


reponse:

`
🌐 Site officiel :

https://lesfacilitateurs.vercel.app/
`

},




{


questions:[

"emploi",
"travail",
"recrutement",
"offre emploi"

],


reponse:

`
💼 Trouvez des opportunités :

https://workshopkmer.vercel.app/#job1
`

},




{


questions:[

"contact",
"whatsapp",
"telephone"

],


reponse:

`
📞 Contact :

WhatsApp : +237670035609

Appel : +237656050097
`

},




{


questions:[

"merci",
"super",
"bravo"

],


reponse:

"Merci beaucoup 😊 Je reste disponible pour vous aider."

}



];






// ==========================
// MOTEUR IA
// ==========================


function AIResponse(question){


let q=question
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");



for(let bloc of BASE_CONNAISSANCE){


for(let mot of bloc.questions){


let m=mot
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");



if(q.includes(m)){


return bloc.reponse;


}


}



}



return `

Je n'ai pas trouvé la réponse.

Pour plus d'informations contactez :

📞 +237656050097

💬 WhatsApp +237670035609

`;

}





// ==========================
// MENU
// ==========================


function openMenu(){

document
.getElementById("sideMenu")
.classList.toggle("active");

}




document.addEventListener(
"click",
function(e){


let menu=document.getElementById("sideMenu");

let btn=document.querySelector(".hamburger");



if(
!menu.contains(e.target)
&&
!btn.contains(e.target)
){

menu.classList.remove("active");

}


});






// ==========================
// MODE SOMBRE
// ==========================


function toggleDark(){

document.body.classList.toggle("dark");

}




// ==========================
// ADMIN
// ==========================


function checkAdmin(){

document.getElementById("adminPopup").style.display="flex";

}



function closeAdmin(){

document.getElementById("adminPopup").style.display="none";

}





// ==========================
// INVITATION
// ==========================


function inviteUsers(){


let lien=window.location.href;


document.getElementById("inviteLink").value=lien;



if(navigator.clipboard){

navigator.clipboard.writeText(lien);


alert(
"Lien copié ✅"
);


}


}





</script>
<script>


// ==========================
// SYSTEME STATUTS
// ==========================


const STATUTS=[


{
type:"image",
url:"https://raw.githubusercontent.com/Lfg237/image-st-joseph-/main/IMG-20260715-WA0001.jpg"
},


{
type:"audio",
url:"https://raw.githubusercontent.com/Lfg237/audio-/main/nom%20de%20dieu%20.mp3"
},


{
type:"iframe",
url:"https://archive.org/embed/in-shot-20250618-050312535"
}


];



let statusIndex=0;



// OUVRIR STATUT


function openStatus(){


document.getElementById(
"statusViewer"
).style.display="flex";


showStatus();


}



// AFFICHER STATUT


function showStatus(){


let box=document.getElementById(
"statusContent"
);


let statut=STATUTS[statusIndex];



if(statut.type==="image"){


box.innerHTML=`

<img src="${statut.url}">

`;



}




else if(statut.type==="audio"){


box.innerHTML=`

<div style="
color:white;
text-align:center;
">

<h2>🎵 Audio</h2>


<audio controls autoplay>

<source src="${statut.url}">

</audio>


</div>

`;



}





else if(statut.type==="video"){


box.innerHTML=`

<video

autoplay

playsinline

controls

controlslist="nofullscreen"

style="
width:90%;
max-height:75vh;
object-fit:contain;
">


<source src="${statut.url}">


</video>

`;



}




else{


box.innerHTML=`

<iframe

src="${statut.url}"

style="
width:90%;
height:75vh;
border:none;
border-radius:20px;
">

</iframe>

`;



}



}




// SUIVANT


function nextStatus(){


statusIndex++;


if(statusIndex>=STATUTS.length){

statusIndex=0;

}


showStatus();


}




// PRECEDENT


function previousStatus(){


statusIndex--;


if(statusIndex<0){

statusIndex=STATUTS.length-1;

}


showStatus();


}





// FERMER


function closeStatus(){


document.getElementById(
"statusViewer"
).style.display="none";


}




// OUVERTURE AUTOMATIQUE


window.addEventListener(
"load",
function(){


setTimeout(function(){


openStatus();


},1500);



});



</script>
