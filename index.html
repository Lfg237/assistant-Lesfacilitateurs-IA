document.body.classList.add("dark");
}

setTimeout(function(){

openStatus();

let request = indexedDB.open("AssistantIA_Local",2);


request.onupgradeneeded = function(e){

    database = e.target.result;


    if(!database.objectStoreNames.contains("users")){

        database.createObjectStore("users",{
            keyPath:"name"
        });

    }



    if(!database.objectStoreNames.contains("messages")){

        database.createObjectStore("messages",{
            keyPath:"id",
            autoIncrement:true
        });

    }



    if(!database.objectStoreNames.contains("rules")){

        database.createObjectStore("rules",{
            keyPath:"id"
        });

    }



    if(!database.objectStoreNames.contains("session")){

        database.createObjectStore("session",{
            keyPath:"id"
        });

    }


};



request.onsuccess=function(e){

    database=e.target.result;

    loadRules();

    loadUserSession();

};

function createUser(){

let name=document.getElementById("username").value.trim();


if(name===""){
alert("Entrez un nom");
return;
}


currentUser=name;
saveUserSession(name);


let tx=database.transaction("users","readwrite");

tx.objectStore("users").put({
name:name,
date:new Date().toLocaleString()
});


document.getElementById("profile").innerHTML=
"Connecté : "+name;


addAIMessage(
"Bienvenue "+name+" 👋 Je suis ton assistant IA lesfacilitteurs."
);


}





// ENVOI MESSAGE


function sendMessage(){

let input=document.getElementById("question");

alert("Vous devez créer un compte avant d'utiliser l'assistant");

openRegister();

return;

}



addUserMessage(text);



saveMessage(
"user",
text
);



input.value="";



setTimeout(()=>{

let answer=AIResponse(text);


addAIMessage(answer);


saveMessage(
"ia",
answer
);


},500);


}

${new Date().toLocaleTimeString()}

// AFFICHAGE IA


function addAIMessage(text){

let box=document.getElementById("chat");


// Transformation automatique des liens en boutons cliquables

let message = text;


// Détection YouTube
message = message.replace(
/https:\/\/(www\.)?youtube\.com\/watch\?v=([a-zA-Z0-9_-]+)/g,
`
<div style="margin-top:10px;">
<iframe 
width="100%" 
height="250"
src="https://www.youtube.com/embed/$2"
frameborder="0"
allowfullscreen>
</iframe>
</div>
`
);


// Détection liens vidéos mp4
message = message.replace(
/(https?:\/\/[^\s]+\.mp4)/g,
`
<video 
controls 
width="100%" 
style="border-radius:15px;margin-top:10px;">
<source src="$1" type="video/mp4">
</video>
`
);


// Autres liens normaux
message = message.replace(
/(https?:\/\/[^\s<]+)/g,
'<br><a href="$1" target="_blank" style="color:#0066ff;font-weight:bold;">🔗 Ouvrir le lien</a>'
);



box.innerHTML +=
`
<div class="message ai">

<b>🤖 Assistant IA</b>

<br>

${message}

<div class="message-time">
${new Date().toLocaleTimeString()}
</div>

</div>
`;


box.scrollTop=box.scrollHeight;

}

// ==========================
// MOTEUR IA AMELIORE
// ==========================


function AIResponse(question){


let q = question.toLowerCase();


// Nettoyage texte

q=q.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");



// 1 - Recherche dans les règles personnalisées admin

let rules = getStoredRules();


if(rules){


let lignes = rules.split("\n");


for(let ligne of lignes){


let separation = ligne.split("=");


if(separation.length >=2){


let mots = separation[0]
.toLowerCase()
.trim();


let reponse = separation.slice(1)
.join("=")
.trim();



if(q.includes(mots)){


return reponse;


}


}



}


}





// 2 - Recherche dans la base de connaissance


for(let bloc of BASE_CONNAISSANCE){


for(let questionPossible of bloc.questions){


let qp = questionPossible
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");



if(q.includes(qp)){


return bloc.reponse;


}



}


}




// 3 - Réponse par défaut


return " pour plus d'info merci de  contacter admin par appel +237656050097  ou whasapp +237670035609.";

}

else if(

){

"

`;

}



// TIKTOK FACEBOOK AUTRES

else{

src="${s.url}"

style="

">

`;

}



}




function nextStatus(){

statusIndex++;

if(statusIndex>=STATUTS.length){

statusIndex=0;

}

showStatus();

}



function previousStatus(){

statusIndex--;

if(statusIndex<0){

statusIndex=STATUTS.length-1;

}

showStatus();

}




function closeStatus(){

document.getElementById("statusViewer").style.display="none";


}



// OUVERTURE AUTOMATIQUE DES STATUTS AU DÉMARRAGE

window.addEventListener("load", function(){

setTimeout(function(){

document.getElementById("statusViewer").style.display="flex";

showStatus();

},1000);

});
</script>
