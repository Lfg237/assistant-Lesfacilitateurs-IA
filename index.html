<script>


let currentUser="";

let database=null;



// ==========================
// BASE LOCALE INDEXEDDB
// ==========================


let request=indexedDB.open("AssistantIA_Local",1);



request.onupgradeneeded=function(e){

database=e.target.result;


if(!database.objectStoreNames.contains("users")){

database.createObjectStore("users",{keyPath:"name"});

}


if(!database.objectStoreNames.contains("messages")){

database.createObjectStore("messages",{
keyPath:"id",
autoIncrement:true
});

}


if(!database.objectStoreNames.contains("session")){

database.createObjectStore("session",{
keyPath:"id"
});

}

};





request.onsuccess = function(e){

    database = e.target.result;

    // Charger la session utilisateur
    loadUserSession(function(){

        // Afficher le message de bienvenue seulement après le chargement
        addAIMessage(
            "Bonjour 👋 Je suis l'assistant IA Lesfacilitateurs. Comment puis-je vous aider ?"
        );

        // Vérification dans la console
        console.log("Utilisateur :", currentUser);
        console.log("localStorage :", localStorage.getItem("assistant_user"));

    });

};


// ==========================
// CREATION COMPTE
// ==========================


function openRegister(){

document.getElementById("registerPopup").style.display="flex";

}



function closeRegister(){

document.getElementById("registerPopup").style.display="none";

}



function createAccount(){

    const name = document.getElementById("registerName").value.trim();

    if(name===""){
        alert("Veuillez entrer votre nom");
        return;
    }

    currentUser = name;

    // Sauvegarde locale
    localStorage.setItem("assistant_user", name);

    // Mise à jour de l'interface
    document.getElementById("profile").innerHTML =
        "✅ Connecté : " + name;

    // Fermer la fenêtre
    closeRegister();

    // Message de bienvenue
    addAIMessage("Bienvenue " + name + " 👋");

    // Sauvegarde dans IndexedDB si disponible
    if(database){

        const tx = database.transaction(["users","session"], "readwrite");

        tx.objectStore("users").put({
            name: name,
            date: new Date().toLocaleString()
        });

        tx.objectStore("session").put({
            id: 1,
            name: name
        });

    }

}


// ==========================
// SESSION
// ==========================


function saveUserSession(){


if(!database)return;


let tx=database.transaction(
"session",
"readwrite"
);


tx.objectStore("session").put({

id:1,

name:currentUser

});


}



function loadUserSession(callback){

    // Vérifier d'abord localStorage
    let saved = localStorage.getItem("assistant_user");

    if(saved){

        currentUser = saved;

        document.getElementById("profile").innerHTML =
        "✅ Connecté : " + currentUser;

        if(callback) callback();

        return;
    }

    // Sinon chercher dans IndexedDB
    if(!database){

        if(callback) callback();

        return;
    }

    let tx = database.transaction("session","readonly");

    let req = tx.objectStore("session").get(1);

    req.onsuccess = function(){

        if(req.result){

            currentUser = req.result.name;

            localStorage.setItem("assistant_user", currentUser);

            document.getElementById("profile").innerHTML =
            "✅ Connecté : " + currentUser;

            console.log("Session restaurée :", currentUser);

        }

        if(callback) callback();

    };

    req.onerror = function(){

        if(callback) callback();

    };

}

function sendMessage(){


let input=document.getElementById("question");


let text=input.value.trim();



if(text==="")return;



if(currentUser===""){


alert(
"Créez un compte avant d'utiliser l'assistant"
);


openRegister();


return;

}



addUserMessage(text);


saveMessage(
"user",
text
);



input.value="";



setTimeout(function(){


let response=AIResponse(text);


addAIMessage(response);



saveMessage(
"ia",
response
);



},500);



}




function addUserMessage(text){


let box=document.getElementById("chat");



box.innerHTML += `

<div class="message user">

${text}


<div class="message-time">

${new Date().toLocaleTimeString()}

</div>


</div>

`;



box.scrollTop=box.scrollHeight;


}




function addAIMessage(text){

let box=document.getElementById("chat");


// Transformer les liens en liens cliquables

let message=text.replace(
/(https?:\/\/[^\s]+)/g,
'<br><a href="$1" target="_blank" style="color:#0066ff;font-weight:bold;">🔗 Ouvrir le lien</a>'
);



box.innerHTML += `

<div class="message ai">

<b>🤖 Assistant IA</b>

<br>

${message}

<div class="message-time">

${new Date().toLocaleTimeString()}

</div>

</div>

`;



box.scrollTop=box.scrollHeight;


}


// ==========================
// SAUVEGARDE MESSAGES
// ==========================


function saveMessage(type,text){


if(!database)return;



let tx=database.transaction(
"messages",
"readwrite"
);



tx.objectStore("messages").add({

user:currentUser,

type:type,

text:text,

date:new Date().toLocaleString()

});


}

// ==========================
// MOTEUR IA
// ==========================


function AIResponse(question){


let q=question
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");



for(let bloc of BASE_CONNAISSANCE){


for(let mot of bloc.questions){


let m=mot
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");



if(q.includes(m)){


return bloc.reponse;


}


}



}



return `

Je n'ai pas  la réponse.

Pour plus d'informations contactez MR Michel :

📞+237656050097

💬 WhatsApp +237670035609

`;

}
